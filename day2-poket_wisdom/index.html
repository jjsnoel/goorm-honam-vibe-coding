<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket Wisdom</title>
    <meta
      name="description"
      content="유명인 명언을 무작위로 보여주는 Pocket Wisdom 명언수첩"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="canvas" aria-live="polite">
      <p class="brand-mark">Pocket Wisdom</p>

      <section id="quotePanel" class="carousel app-panel is-active" aria-label="명언 롤링 배너">
        <div class="carousel-viewport">
          <div id="carouselTrack" class="carousel-track"></div>
        </div>

        <button
          id="prevButton"
          class="nav-button nav-prev"
          type="button"
          aria-label="이전 명언"
        >
          ‹
        </button>
        <button
          id="nextButton"
          class="nav-button nav-next"
          type="button"
          aria-label="다음 명언"
        >
          ›
        </button>

        <div class="carousel-ui">
          <div id="carouselDots" class="carousel-dots" hidden></div>
          <p id="statusText" class="status-text" role="status"></p>
        </div>

        <aside id="quoteToolbar" class="quote-dock" aria-label="명언 설정 및 도구">
          <div class="dock-card">
            <div class="dock-category">
              <label class="dock-label" for="categorySelect">카테고리</label>
              <div class="dock-select-wrap">
                <span class="dock-select-icon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
                </span>
                <select id="categorySelect" aria-label="명언 카테고리"></select>
              </div>
            </div>

            <div class="dock-divider" aria-hidden="true"></div>

            <div class="dock-tools">
              <span class="dock-label">도구</span>
              <div class="dock-actions">
                <button
                  id="colorModeToggle"
                  class="dock-icon-btn"
                  type="button"
                  aria-pressed="false"
                  aria-label="다크 모드로 전환"
                  title="다크 모드"
                >
                  <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button id="shareButton" class="dock-icon-btn" type="button" aria-label="명언 공유" title="공유">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                </button>
                <button id="savePngButton" class="dock-icon-btn" type="button" aria-label="PNG로 저장" title="PNG 저장">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
              </div>
            </div>

            <p id="slideCounter" class="dock-counter" aria-live="polite"></p>
          </div>
        </aside>
      </section>

      <section id="timerPanel" class="timer-panel app-panel" aria-label="뽀모도로 타이머" hidden>
        <div class="timer-shell">
          <div class="timer-unit-toggle" role="group" aria-label="시간 단위">
            <button id="timerUnitMinute" class="timer-unit is-active" type="button">
              분 모드
            </button>
            <button id="timerUnitHour" class="timer-unit" type="button">시간 모드</button>
          </div>

          <div
            id="timerRing"
            class="timer-ring"
            role="slider"
            aria-label="타이머 시간 설정"
            aria-valuemin="1"
            aria-valuemax="60"
            aria-valuenow="25"
            tabindex="0"
          >
            <svg viewBox="0 0 120 120" class="timer-svg" aria-hidden="true">
              <defs>
                <linearGradient id="timerPastelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f0c4b4" />
                  <stop offset="50%" stop-color="#e8b4a0" />
                  <stop offset="100%" stop-color="#9eb8b8" />
                </linearGradient>
              </defs>
              <circle class="timer-ring-track" cx="60" cy="60" r="52"></circle>
              <circle id="timerProgressCircle" class="timer-ring-progress" cx="60" cy="60" r="52"></circle>
            </svg>
            <div id="timerKnob" class="timer-knob" aria-hidden="true"></div>
            <div class="timer-face">
              <strong id="timerDisplay" class="timer-display">25:00</strong>
              <span id="timerHint" class="timer-hint">원을 드래그해 시간 설정</span>
            </div>
          </div>

          <div class="timer-actions">
            <button id="timerToggleButton" class="timer-action timer-primary" type="button">시작</button>
            <button id="timerResetButton" class="timer-action" type="button">초기화</button>
          </div>
        </div>
      </section>

      <nav class="app-switcher" aria-label="화면 전환">
        <button class="app-switch is-active" type="button" data-view="quotes" aria-controls="quotePanel">
          명언칸
        </button>
        <button class="app-switch" type="button" data-view="timer" aria-controls="timerPanel">
          타이머칸
        </button>
      </nav>
    </main>

    <footer class="footer">Developer: jjs</footer>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
